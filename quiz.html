<!doctype html>
<html lang="en-NZ">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Which bathroom week are you? — Weekly Bathrooms 30-second quiz</title>
<meta name="description" content="Answer 5 quick questions and get an instant indicative price for your Auckland bathroom renovation. Fixed price, fixed date, less pain. Backed by a Registered Master Builder.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16201f;
    --ink-soft:#3a4a48;
    --cream:#f4efe6;
    --paper:#fbf9f4;
    --aqua:#0fb6a8;
    --aqua-deep:#0a8d82;
    --aqua-wash:#dcf3f0;
    --coral:#ff6a4d;
    --line:rgba(22,32,31,.12);
    --shadow:0 18px 50px -22px rgba(22,32,31,.35);
    --display:'Bricolage Grotesque', serif;
    --body:'Hanken Grotesk', system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--body);color:var(--ink);background:var(--paper);
    line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    min-height:100vh;display:flex;flex-direction:column;
  }
  h1,h2,h3{font-family:var(--display);line-height:1.04;letter-spacing:-.02em;font-weight:800}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:760px;margin:0 auto;padding:0 24px;width:100%}

  /* announce */
  .announce{background:var(--ink);color:var(--cream);font-size:.8rem;letter-spacing:.04em;text-align:center;padding:9px 16px;font-weight:500}
  .announce b{color:var(--aqua)}

  /* nav */
  header.nav{position:sticky;top:0;z-index:60;background:rgba(251,249,244,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:68px;max-width:1180px;margin:0 auto;padding:0 24px}
  .logo{display:flex;align-items:center;gap:11px;font-family:var(--display);font-weight:800;font-size:1.2rem;letter-spacing:-.03em}
  .logo .mark{width:32px;height:32px;border-radius:9px;background:var(--aqua);position:relative;flex:0 0 auto;box-shadow:inset 0 0 0 2px rgba(255,255,255,.25)}
  .logo .mark::before{content:"";position:absolute;inset:8px 8px auto 8px;height:4px;border-radius:3px;background:#fff;opacity:.95}
  .logo .mark::after{content:"";position:absolute;inset:auto 8px 8px 8px;height:8px;border-radius:0 0 5px 5px;background:#fff;opacity:.95}
  .navlinks{display:flex;gap:26px;align-items:center;font-weight:500;font-size:.95rem}
  .navlinks a{color:var(--ink-soft);transition:color .2s}
  .navlinks a:hover{color:var(--aqua-deep)}
  @media(max-width:640px){.navlinks{display:none}}
  .nav-call{font-weight:600;font-size:.95rem;color:var(--ink-soft);display:flex;align-items:center;gap:8px}
  .nav-call svg{color:var(--aqua-deep)}
  @media(max-width:560px){.nav-call span{display:none}}

  /* stage */
  .stage{flex:1;display:flex;align-items:center;padding:48px 0 64px}
  .card{
    background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);
    padding:42px 40px 40px;position:relative;overflow:hidden;
  }
  .card::after{content:"";position:absolute;right:-160px;top:-160px;width:380px;height:380px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--aqua-wash), transparent 68%);z-index:0;pointer-events:none}
  .card > *{position:relative;z-index:2}
  @media(max-width:560px){.card{padding:30px 22px 30px;border-radius:20px}}

  .eyebrow{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--aqua-deep);margin-bottom:18px}
  .eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--coral);animation:pulse 2.4s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,106,77,.45)}50%{box-shadow:0 0 0 7px rgba(255,106,77,0)}}

  /* intro */
  .intro h1{font-size:clamp(2.1rem,5.6vw,3.2rem)}
  .intro h1 .strike{position:relative;color:var(--ink-soft);opacity:.62}
  .intro h1 .strike::after{content:"";position:absolute;left:-2%;right:-2%;top:54%;height:5px;background:var(--coral);transform:rotate(-2deg);border-radius:3px}
  .intro p.lead{font-size:1.12rem;color:var(--ink-soft);max-width:34rem;margin:18px 0 26px}
  .intro .meta{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:30px}
  .intro .meta div{display:flex;align-items:center;gap:9px;font-size:.92rem;color:var(--ink-soft);font-weight:500}
  .intro .meta svg{color:var(--aqua-deep);flex:0 0 auto}

  /* buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--ink);color:var(--cream);
    padding:15px 26px;border-radius:100px;font-weight:600;font-size:1rem;cursor:pointer;border:none;
    transition:transform .18s, box-shadow .18s, background .2s;font-family:var(--body);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:var(--shadow);background:#000}
  .btn.aqua{background:var(--aqua);color:#04302c}
  .btn.aqua:hover{background:var(--aqua-deep);color:#fff}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .btn.ghost:hover{background:var(--ink);color:var(--cream)}
  .btn.lg{padding:17px 32px;font-size:1.05rem}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

  /* progress */
  .prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}
  .prog-step{font-weight:600;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;color:var(--aqua-deep)}
  .prog-back{font-size:.86rem;color:var(--ink-soft);cursor:pointer;display:inline-flex;align-items:center;gap:6px;background:none;border:none;font-family:var(--body);font-weight:500}
  .prog-back:hover{color:var(--ink)}
  .prog-track{height:7px;border-radius:100px;background:var(--cream);overflow:hidden;margin-bottom:30px}
  .prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--aqua),var(--aqua-deep));width:0;transition:width .45s cubic-bezier(.4,0,.2,1)}

  /* question */
  .q h2{font-size:clamp(1.5rem,3.6vw,2.05rem);margin-bottom:6px}
  .q .sub{color:var(--ink-soft);font-size:1rem;margin-bottom:24px}
  .opts{display:grid;gap:12px}
  .opt{
    display:flex;align-items:center;gap:16px;text-align:left;background:var(--paper);border:1.5px solid var(--line);
    border-radius:15px;padding:17px 19px;cursor:pointer;transition:border-color .18s, background .18s, transform .12s;
    font-family:var(--body);font-size:1.02rem;color:var(--ink);width:100%;
  }
  .opt:hover{border-color:var(--aqua);background:#fff}
  .opt:active{transform:scale(.99)}
  .opt.sel{border-color:var(--aqua);background:var(--aqua-wash)}
  .opt .ic{width:42px;height:42px;border-radius:11px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;color:var(--aqua-deep);flex:0 0 auto}
  .opt.sel .ic{background:var(--aqua);color:#fff;border-color:var(--aqua)}
  .opt b{display:block;font-weight:600;font-size:1.02rem;line-height:1.25}
  .opt small{display:block;color:var(--ink-soft);font-size:.86rem;margin-top:2px}

  /* result */
  .result .topline{font-weight:600;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;color:var(--aqua-deep);margin-bottom:14px}
  .result-hero{display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap}
  .result-num{font-family:var(--display);font-weight:800;font-size:5rem;line-height:.82;color:var(--ink);flex:0 0 auto}
  .result-num span{display:block;font-size:.8rem;font-weight:600;letter-spacing:.12em;color:var(--ink-soft);text-transform:uppercase;margin-top:8px}
  .result-head h2{font-size:clamp(1.8rem,4.4vw,2.6rem)}
  .result-head .tag{color:var(--ink-soft);font-size:1.04rem;margin-top:4px;max-width:24rem}
  .consent{font-size:.78rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:100px;margin-top:14px;width:fit-content}
  .consent.no{background:#e4f6ea;color:#1f8a4c}
  .consent.yes{background:#fdeede;color:#c2691a}

  .price-band{display:flex;align-items:baseline;gap:12px;margin:26px 0 4px;flex-wrap:wrap}
  .price-band .from{font-size:.8rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
  .price-band .amt{font-family:var(--display);font-weight:800;font-size:2.8rem;color:var(--ink)}
  .price-band .unit{color:var(--ink-soft);font-size:.95rem}
  .price-note{font-size:.84rem;color:var(--ink-soft);max-width:36rem}

  .incl{margin:24px 0;display:grid;gap:10px;background:var(--cream);border-radius:16px;padding:22px 24px}
  .incl h3{font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-family:var(--body);font-weight:700;margin-bottom:4px}
  .incl li{list-style:none;display:flex;gap:11px;align-items:flex-start;font-size:.98rem;color:var(--ink-soft)}
  .incl li svg{color:var(--aqua-deep);flex:0 0 auto;margin-top:4px}

  .switch{font-size:.9rem;color:var(--ink-soft);margin:18px 0 2px}
  .switch button{background:none;border:none;color:var(--aqua-deep);font-weight:600;cursor:pointer;font-family:var(--body);font-size:.9rem;text-decoration:underline;padding:0}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .pill{border:1.5px solid var(--line);background:#fff;border-radius:100px;padding:8px 15px;font-size:.86rem;font-weight:600;cursor:pointer;font-family:var(--body);color:var(--ink-soft);transition:border-color .18s,color .18s}
  .pill:hover{border-color:var(--aqua-deep);color:var(--aqua-deep)}
  .pill.active{background:var(--aqua-wash);border-color:var(--aqua);color:var(--aqua-deep)}

  /* form */
  .booking{margin-top:30px;border-top:1px solid var(--line);padding-top:30px}
  .booking h3{font-size:clamp(1.4rem,3.2vw,1.8rem);margin-bottom:6px}
  .booking p.sub{color:var(--ink-soft);font-size:1rem;margin-bottom:22px}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field.full{grid-column:1/-1}
  .field label{font-size:.84rem;font-weight:600;color:var(--ink-soft)}
  .field input,.field select{
    font-family:var(--body);font-size:1rem;padding:13px 15px;border-radius:12px;border:1.5px solid var(--line);
    background:var(--paper);color:var(--ink);transition:border-color .18s,background .18s;width:100%;
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--aqua);background:#fff}
  .field input.err{border-color:var(--coral)}
  .form-foot{display:flex;align-items:center;gap:16px;margin-top:22px;flex-wrap:wrap}
  .form-micro{font-size:.82rem;color:var(--ink-soft);display:flex;align-items:center;gap:8px;max-width:24rem}
  .form-micro svg{color:var(--aqua-deep);flex:0 0 auto}
  @media(max-width:560px){.fields{grid-template-columns:1fr}.result-num{font-size:4rem}}

  /* confirmation */
  .done{text-align:center;padding:14px 0}
  .done .check{width:78px;height:78px;border-radius:50%;background:var(--aqua-wash);display:grid;place-items:center;margin:0 auto 24px;color:var(--aqua-deep)}
  .done h2{font-size:clamp(1.8rem,4.4vw,2.6rem);margin-bottom:12px}
  .done p{color:var(--ink-soft);font-size:1.08rem;max-width:32rem;margin:0 auto 8px}
  .done .summary{background:var(--cream);border-radius:16px;padding:20px 24px;margin:26px auto 0;max-width:30rem;text-align:left}
  .done .summary div{display:flex;justify-content:space-between;gap:16px;padding:7px 0;font-size:.95rem;border-bottom:1px solid var(--line)}
  .done .summary div:last-child{border-bottom:none}
  .done .summary span{color:var(--ink-soft)}
  .done .summary b{font-weight:600}

  /* trust footer strip */
  .footstrip{background:var(--ink);color:rgba(244,239,230,.78);padding:22px 0;font-size:.86rem}
  .footstrip-in{display:flex;flex-wrap:wrap;gap:10px 28px;align-items:center;justify-content:center;text-align:center;max-width:1180px;margin:0 auto;padding:0 24px}
  .footstrip b{color:var(--aqua)}
  .footstrip .sep{opacity:.3}
  @media(max-width:620px){.footstrip .sep{display:none}}

  .anim{animation:rise .5s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="announce">⚡ Auckland only · <b>fixed price, fixed date,</b> no surprises · Weeks 1–3 need no council consent</div>

<header class="nav">
  <div class="nav-in">
    <a class="logo" href="index.html"><span class="mark"></span>Weekly Bathrooms</a>
    <nav class="navlinks">
      <a href="index.html">Home</a>
      <a href="gallery.html">Our bathrooms</a>
    </nav>
    <a class="nav-call" href="tel:093935658">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.8a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2Z"/></svg>
      <span>09 393 5658</span>

</header>

<main class="stage">
  <div class="wrap">
    <div class="card" id="card"><!-- screens injected here --></div>
  </div>
</main>

<div class="footstrip">
  <div class="footstrip-in">
    <span>Backed by <b>Add Value Renovations</b> — Registered Master Builder</span>
    <span class="sep">·</span>
    <span>10-Year Guarantee</span>
    <span class="sep">·</span>
    <span>LBP Licensed</span>
    <span class="sep">·</span>
    <span>500+ Auckland homes</span>
  </div>
</div>

<script>
/* ---------- TIER DATA ---------- */
const TIERS = {
  1:{ n:1, unit:"Week",  name:"The Refresh",  from:8000,
      tag:"A clean, modern lift — in and out fast.",
      consent:"no",
      incl:["New shower box (like-for-like swap)","New vanity","Full repaint"],
      best:"Rentals, ensuites and a quick modern refresh" },
  2:{ n:2, unit:"Weeks", name:"The Upgrade",  from:13000,
      tag:"A low-maintenance mid-range refit.",
      consent:"no",
      incl:["Everything in Week 1","New acrylic shower","New vinyl or SPC flooring"],
      best:"A durable, low-maintenance everyday bathroom" },
  3:{ n:3, unit:"Weeks", name:"The Tile-Look", from:17000,
      tag:"The tiled look — without the grout or the wait.",
      consent:"no",
      incl:["Everything in Week 2","Tile-look wall panels — no grout to scrub","Premium fittings"],
      best:"The tiled look, faster and cheaper than real tiles" },
  4:{ n:4, unit:"Weeks", name:"The Full Tile", from:24000,
      tag:"A premium, fully custom tiled finish — consent handled.",
      consent:"yes",
      incl:["Fully tiled shower & walls","New waterproofing membrane","We lodge & manage council consent for you"],
      best:"A premium, fully bespoke tiled bathroom" }
};

/* ---------- QUESTIONS ---------- */
/* each option scores points toward tiers 1-4 */
const Q = [
  { q:"What's this bathroom for?",
    sub:"This helps us pitch it at the right level.",
    opts:[
      { t:"A rental or between-tenancy turnaround", s:"Fast, tidy, tenant-ready", ic:"key",   w:{1:3,2:1} },
      { t:"We're selling soon and want it fresh",   s:"Maximise appeal for buyers", ic:"tag",  w:{1:2,2:2} },
      { t:"Our own bathroom — it's just tired",     s:"Everyday use, time for an update", ic:"home", w:{2:2,3:2} },
      { t:"Our forever home — do it properly",      s:"Worth investing in", ic:"heart", w:{3:1,4:3} }
    ]},
  { q:"What finish are you picturing?",
    sub:"The single biggest driver of your week.",
    opts:[
      { t:"Just clean, fresh and modern",      s:"New gear, nicely finished", ic:"spark", w:{1:3} },
      { t:"Sleek, low-maintenance acrylic",    s:"Wipe-clean, no fuss", ic:"drop", w:{2:3} },
      { t:"The tiled look — minus the grout",  s:"Tile-pattern panels", ic:"grid", w:{3:3} },
      { t:"Real floor-to-ceiling tiles",       s:"Fully tiled, fully custom", ic:"tile", w:{4:3} }
    ]},
  { q:"How much is changing?",
    sub:"Same layout is faster; the works takes longer.",
    opts:[
      { t:"Same layout — like-for-like swaps", s:"Nothing moves", ic:"swap", w:{1:3,2:1} },
      { t:"New shower and new floor",          s:"The main surfaces", ic:"shower", w:{2:3,3:1} },
      { t:"Feature walls + premium fittings",  s:"A proper step up", ic:"star", w:{3:3,4:1} },
      { t:"The works — fully custom",          s:"Everything, top to bottom", ic:"crown", w:{4:3} }
    ]},
  { q:"How soon do you want it done?",
    sub:"We can start Weeks 1–3 in days — no consent needed.",
    opts:[
      { t:"ASAP — fastest possible",                 s:"Speed is the priority", ic:"bolt",  w:{1:2,2:1} },
      { t:"Within a month is fine",                  s:"Reasonably soon", ic:"calendar", w:{2:1,3:1} },
      { t:"I'll wait for exactly the finish I want", s:"Quality over speed", ic:"gem", w:{4:2} }
    ]},
  { q:"Rough budget you have in mind?",
    sub:"A ballpark is fine — we confirm a fixed price on site.",
    opts:[
      { t:"Under $10,000",  s:"Keep it lean", ic:"coin", w:{1:4} },
      { t:"$10k – $15k",    s:"Mid-range", ic:"coin", w:{2:4} },
      { t:"$15k – $20k",    s:"Stepping up", ic:"coin", w:{3:4} },
      { t:"$20,000+",       s:"Premium", ic:"coin", w:{4:4} }
    ]}
];

/* ---------- ICONS ---------- */
const ICON = {
  key:'<path d="M21 2l-2 2m-7.6 7.6a5 5 0 1 0-1 1L15 16l2-2 2 2 2-2-2-2 2-2-3-3"/>',
  tag:'<path d="M20 13.3 13.3 20a1.6 1.6 0 0 1-2.3 0l-7-7V4h9l7 7a1.6 1.6 0 0 1 0 2.3Z"/><circle cx="7.5" cy="7.5" r="1.2"/>',
  home:'<path d="M3 10.5 12 3l9 7.5M5 9.5V21h14V9.5"/>',
  heart:'<path d="M12 21s-7.5-4.6-10-9A5.2 5.2 0 0 1 12 6a5.2 5.2 0 0 1 10 6c-2.5 4.4-10 9-10 9Z"/>',
  spark:'<path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5 18 18M18 6l-2.5 2.5M8.5 15.5 6 18"/>',
  drop:'<path d="M12 3s6 6.4 6 11a6 6 0 0 1-12 0c0-4.6 6-11 6-11Z"/>',
  grid:'<path d="M4 4h16v16H4zM4 10h16M4 16h16M10 4v16M16 4v16"/>',
  tile:'<path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>',
  swap:'<path d="M7 4 3 8l4 4M3 8h13M17 20l4-4-4-4M21 16H8"/>',
  shower:'<path d="M4 20v-7a6 6 0 0 1 12 0M16 8a3 3 0 0 1 4 3M12 16v.01M9 19v.01M15 19v.01"/>',
  star:'<path d="M12 3l2.7 5.5 6 .9-4.3 4.2 1 6-5.4-2.8L6.6 19.6l1-6L3.3 9.4l6-.9L12 3Z"/>',
  crown:'<path d="M3 7l4 4 5-6 5 6 4-4v11H3z"/>',
  bolt:'<path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/>',
  calendar:'<path d="M4 5h16v16H4zM4 9h16M8 3v4M16 3v4"/>',
  gem:'<path d="M6 3h12l3 6-9 12L3 9l3-6ZM3 9h18M9 3 6 9l6 12 6-12-3-6"/>',
  coin:'<circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.2a2.4 2.4 0 0 1 2.5-1.2c1.4 0 2.5.8 2.5 2s-1.1 1.7-2.5 2-2.5.9-2.5 2 1.1 2 2.5 2a2.4 2.4 0 0 0 2.5-1.2"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  back:'<path d="M19 12H5M12 19l-7-7 7-7"/>',
  shield:'<path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3Z"/>',
  lock:'<path d="M6 11V7a6 6 0 0 1 12 0v4M5 11h14v9H5z"/>'
};
function svg(name,sz){sz=sz||20;return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICON[name]||''}</svg>`}
function money(n){return '$'+n.toLocaleString('en-NZ')}

/* ---------- STATE ---------- */
const card = document.getElementById('card');
let step = 0;                 // 0 = intro, 1..Q.length = questions
const answers = new Array(Q.length).fill(null);
let resultTier = null;        // chosen tier number
let manualPick = false;

/* ---------- SCORING ---------- */
function scoreTiers(){
  const score = {1:0,2:0,3:0,4:0};
  answers.forEach((ai,qi)=>{
    if(ai==null) return;
    const w = Q[qi].opts[ai].w;
    for(const t in w) score[t]+=w[t];
  });
  // pick highest; tie -> lowest tier (brand leans fast/affordable)
  let best=1, bestScore=-1;
  for(let t=1;t<=4;t++){ if(score[t]>bestScore){bestScore=score[t];best=t;} }
  return best;
}

/* ---------- RENDER ---------- */
function render(){
  if(step===0) return renderIntro();
  return renderQuestion();
}

function renderIntro(){
  card.className='card';
  card.innerHTML = `
    <div class="intro anim">
      <span class="eyebrow"><span class="dot"></span>30-second quiz</span>
      <h1>Which week is<br>your bathroom?</h1>
      <p class="lead">Answer 5 quick questions and we'll match you to the right package — with an instant indicative price. No email wall, no obligation.</p>
      <div class="meta">
        <div>${svg('bolt',18)} Takes 30 seconds</div>
        <div>${svg('check',18)} Instant price guide</div>
        <div>${svg('shield',18)} Master Builder backed</div>
      </div>
      <button class="btn aqua lg" id="start">Start the quiz →</button>
    </div>`;
  document.getElementById('start').onclick=()=>{step=1;render()};
}

function renderQuestion(){
  const qi = step-1;
  const item = Q[qi];
  const pct = Math.round((step/(Q.length))*100);
  card.className='card';
  card.innerHTML = `
    <div class="q anim">
      <div class="prog-row">
        <span class="prog-step">Question ${step} of ${Q.length}</span>
        <button class="prog-back" id="back">${svg('back',15)} Back</button>
      </div>
      <div class="prog-track"><div class="prog-fill" id="fill"></div></div>
      <h2>${item.q}</h2>
      <p class="sub">${item.sub}</p>
      <div class="opts" id="opts">
        ${item.opts.map((o,i)=>`
          <button class="opt${answers[qi]===i?' sel':''}" data-i="${i}">
            <span class="ic">${svg(o.ic,20)}</span>
            <span><b>${o.t}</b><small>${o.s}</small></span>
          </button>`).join('')}
      </div>
    </div>`;
  requestAnimationFrame(()=>{document.getElementById('fill').style.width=pct+'%'});
  document.getElementById('back').onclick=()=>{ step--; render(); };
  document.querySelectorAll('.opt').forEach(b=>{
    b.onclick=()=>{
      answers[qi]=+b.dataset.i;
      document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      setTimeout(()=>{
        if(step < Q.length){ step++; render(); }
        else { resultTier = scoreTiers(); manualPick=false; renderResult(); }
      },230);
    };
  });
}

function renderResult(){
  const t = TIERS[resultTier];
  card.className='card';
  const others = [1,2,3,4].filter(x=>x!==resultTier);
  card.innerHTML = `
    <div class="result anim">
      <div class="topline">${manualPick?'Your selection':'Your best-fit package'}</div>
      <div class="result-hero">
        <div class="result-num">${t.n}<span>${t.unit}</span></div>
        <div class="result-head">
          <h2>${t.name}</h2>
          <p class="tag">${t.tag}</p>
          <span class="consent ${t.consent}">
            ${t.consent==='no' ? svg('check',14)+' No council consent needed' : svg('lock',14)+' Consent handled by us'}
          </span>
        </div>
      </div>

      <div class="price-band">
        <span class="from">From</span>
        <span class="amt">${money(t.from)}</span>
        <span class="unit">+GST · indicative</span>
      </div>
      <p class="price-note">${t.n<4
        ? 'Weeks 1–3 are like-for-like upgrades, so we can start in days. Your exact fixed price is locked in writing after a free 20-minute site check.'
        : '"4 weeks on site" — a fully tiled shower needs a new waterproofing membrane and council consent, which we lodge and manage for you up front. Your fixed price is locked after a free site check.'}</p>

      <div class="incl">
        <h3>What's included</h3>
        ${t.incl.map(i=>`<li>${svg('check',16)}<span>${i}</span></li>`).join('')}
      </div>

      <div class="switch">Not quite right? <button id="seeall">Pick a different week</button></div>
      <div class="pill-row" id="pills" hidden>
        ${others.map(x=>`<button class="pill" data-t="${x}">Week ${x} · ${TIERS[x].name} · from ${money(TIERS[x].from)}</button>`).join('')}
      </div>

      <div class="booking">
        <h3>Lock in your free site check</h3>
        <p class="sub">We'll come measure up, confirm your fixed price, and give you a finish date in writing — no obligation.</p>
        <form id="bookform" novalidate>
          <div class="fields">
            <div class="field"><label for="name">Your name</label><input id="name" name="name" autocomplete="name" placeholder="Jane Smith"></div>
            <div class="field"><label for="phone">Phone</label><input id="phone" name="phone" inputmode="tel" autocomplete="tel" placeholder="021 234 5678"></div>
            <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" placeholder="jane@email.co.nz"></div>
            <div class="field"><label for="suburb">Suburb</label><input id="suburb" name="suburb" placeholder="e.g. Mt Eden"></div>
          </div>
          <div class="form-foot">
            <button class="btn aqua lg" type="submit">Book my free site check →</button>
            <span class="form-micro">${svg('shield',16)} Your details only go to the Weekly Bathrooms team — never shared.</span>
          </div>
        </form>
      </div>
    </div>`;

  // toggle alternate tiers
  document.getElementById('seeall').onclick=()=>{
    const p=document.getElementById('pills'); p.hidden=!p.hidden;
  };
  document.querySelectorAll('.pill').forEach(b=>{
    b.onclick=()=>{ resultTier=+b.dataset.t; manualPick=true; renderResult(); window.scrollTo({top:0,behavior:'smooth'}); };
  });

  document.getElementById('bookform').onsubmit=(e)=>{
    e.preventDefault();
    const f=e.target;
    const name=f.name.value.trim(), phone=f.phone.value.trim(), email=f.email.value.trim(), suburb=f.suburb.value.trim();
    let ok=true;
    [['name',name],['phone',phone]].forEach(([id,v])=>{ const el=f[id]; if(!v){el.classList.add('err');ok=false;} else el.classList.remove('err'); });
    if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){f.email.classList.add('err');ok=false;} else f.email.classList.remove('err');
    if(!ok){ f.querySelector('.err').focus(); return; }
    // TODO: wire to backend / Make.com webhook / email. For now, capture + confirm.
    const lead = { name, phone, email, suburb, tier:`Week ${TIERS[resultTier].n} — ${TIERS[resultTier].name}`, indicativeFrom:money(TIERS[resultTier].from), answers:answers.map((a,i)=>a==null?'—':Q[i].opts[a].t) };
    console.log('WEEKLY BATHROOMS LEAD →', lead);
    renderDone(lead);
  };
}

function renderDone(lead){
  card.className='card';
  card.innerHTML = `
    <div class="done anim">
      <div class="check">${svg('check',38)}</div>
      <h2>You're booked in, ${lead.name.split(' ')[0]}.</h2>
      <p>Nice choice. The Weekly Bathrooms team will call you on <b>${lead.phone}</b> within one business day to lock in your free site check.</p>
      <p>Prefer to talk now? Call <a href="tel:093935658" style="color:var(--aqua-deep);font-weight:600">09 393 5658</a>.</p>
      <div class="summary">
        <div><span>Your package</span><b>${lead.tier}</b></div>
        <div><span>Indicative from</span><b>${lead.indicativeFrom} +GST</b></div>
        <div><span>Suburb</span><b>${lead.suburb||'—'}</b></div>
        <div><span>We'll contact you on</span><b>${lead.phone}</b></div>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
